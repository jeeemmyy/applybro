name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  safety:
    name: Safety rails
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # These three are the project's non-negotiables. They are plain static
      # checks with no dependencies, so they run first and fast.
      - name: Nothing can submit an application (backend)
        run: python3 scripts/check_never_submits.py
      - name: Nothing can submit an application (extension)
        run: python3 scripts/check_extension_never_submits.py
      - name: No secrets or personal data in logs
        run: python3 scripts/check_safe_logging.py

      # NOTE: scripts/release_check.py is deliberately NOT run here. It
      # compares tracked files against the maintainer's own profile.yaml /
      # content.yaml, which do not exist in CI — so it would pass without
      # checking anything, which is exactly the kind of green tick this
      # project treats as a bug. It gates `scripts/publish.py` locally instead.

  backend:
    name: Backend imports
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
          cache: pip
      - run: pip install -r requirements.txt
      - name: Byte-compile every module
        run: python3 -m compileall -q backend scripts
      - name: Import the app (catches broken wiring, not just syntax)
        run: python3 -c "import backend.app.server, backend.app.scan, backend.config"

  extension:
    name: Extension syntax
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: for f in extension/*.js; do node --check "$f"; done
      - name: manifest.json is valid JSON
        run: node -e "JSON.parse(require('fs').readFileSync('extension/manifest.json','utf8'))"

  frontend:
    name: Dashboard build
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      - run: npm ci
        working-directory: frontend
      - run: npx vite build
        working-directory: frontend
